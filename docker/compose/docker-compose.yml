services:
  stirling-pdf:
    image: stirling-pdf-custom
    build:
      context: ../..
      dockerfile: docker/embedded/Dockerfile
    container_name: stirling-pdf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080$${SYSTEM_ROOTURIPATH:-''}/api/v1/info/status | grep -q 'UP'"]
      interval: 5s
      timeout: 10s
      retries: 16
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../../trainingData:/usr/share/tessdata:rw
      - ../../extraConfigs:/configs:rw
      - ../../logs:/logs:rw
      - ../../customFiles:/customFiles:rw
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SECURITY_ENABLELOGIN: "false"
      DISABLE_ADDITIONAL_FEATURES: "true"
      #SECURITY_ENABLELOGIN: "true"
      #DISABLE_ADDITIONAL_FEATURES: "false"
      #SECURITY_INITIALLOGIN_USERNAME: "admin"
      #SECURITY_INITIALLOGIN_PASSWORD: "stirling" ou 08de....

      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"

      SYSTEM_DEFAULTLOCALE: "pt-BR"
      UI_APP_LOCALE: "pt-BR"
      UI_APPNAME: "PMRO PDF"
      UI_APPNAMENAVBAR: "PMRO PDF"
      UI_HOMEDESCRIPTION: "Ferramentas de PDF da Prefeitura de Rio das Ostras"
      UI_DEFAULT_VIEW: "grid"

      TESSDATA_PREFIX: "/usr/share/tessdata"

      SYSTEM_MAXFILESIZE: "0"
      SYSTEM_FILEUPLOADLIMIT: "999GB"

      METRICS_ENABLED: "true"
      SYSTEM_GOOGLEVISIBILITY: "false"
      SHOW_SURVEY: "false"
    networks:
      - stirling-network

networks:
  stirling-network:
    driver: bridge
